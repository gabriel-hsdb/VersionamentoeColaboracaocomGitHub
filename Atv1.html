<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Compra de Cadernos</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f3f3f3;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:320px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    width:93%;
    padding:10px;
    margin:10px 0;
    border-radius: 10px;
}

button{
    width:100%;
    padding:10px;
    background:#4caf50;
    border:none;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#00a136;
}

.resultado{
    margin-top:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Compra de Cadernos</h2>

<label>Quantidade de cadernos:</label>
<input type="number" id="quantidade" placeholder="Digite a quantidade">

<button onclick="calcularCompra()">Calcular Total</button>

<div class="resultado">
<p id="mensagem"></p>
<p id="total"></p>
</div>

</div>

<script>

function calcularCompra(){

let precoUnitario = 12.50;

let quantidade = document.getElementById("quantidade").value;

let total = quantidade * precoUnitario;

document.getElementById("mensagem").innerText =
"Você comprou " + quantidade + " caderno(s). Preço unitário: R$ " + precoUnitario.toFixed(2);

document.getElementById("total").innerText =
"Valor total da compra: R$ " + total.toFixed(2);

}

</script>

</body>
</html>
