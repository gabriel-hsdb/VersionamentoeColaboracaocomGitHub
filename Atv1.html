<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Atv 1</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #000000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:rgb(255, 96, 221);
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgb(255, 0, 191);
    text-align:center;
}

input{
    padding:10px;
    width:200px;
    margin:10px 0;
}

button{
    padding:10px 20px;
    background:#ff00f2;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#ff00d4;
}

#resultado{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

h1{
    color: 
    rgb(255, 0, 170);
}
label{
    color: rgb(255, 0, 242);
}

#quantidade{
    background-color: #000000;
    color: aliceblue;
}

</style>

</head>

<body>

<div class="container">

<h1>Loja do seu zé</h1>

<label>quantos cadernos vc vai compra:</label><br>
<input type="number" id="quantidade" placeholder="Digite a quantidade">

<br>

<button onclick="calcular()">somar produtos</button>

<div id="resultado"></div>

</div>

<script>

function calcular(){

const precoUnitario = 12.50;

let quantidade = document.getElementById("quantidade").value;

let total = quantidade * precoUnitario;

let totalFormatado = total.toLocaleString("pt-BR", {
style: "currency",
currency: "BRL"
});

document.getElementById("resultado").innerHTML =
`
Você comprou <b>${quantidade}</b> caderno <br>
Preço unitário: <b>R$ 12,50</b> <br>
tu vai paga: <b>${totalFormatado}</b>
`;

}

</script>

</body>
</html>
