<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Reajuste de Preço</title>
<style>

    body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:320px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

input{
    width:93%;
    padding:10px;
    margin:10px 0;
    border-radius: 10px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#4caf50;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0b7dda;
}

.resultado{
    margin-top:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Reajuste de Preço</h2>

<label>Preço atual do produto:</label>
<input type="number" id="preco" placeholder="Digite o preço">

<button onclick="calcularAumento()">Calcular reajuste</button>

<div class="resultado">
<p id="precoOriginal"></p>
<p id="aumento"></p>
<p id="precoFinal"></p>
<p id="percentual"></p>
<p id="diferenca"></p>
</div>

</div>

<script>

    function calcularAumento(){

    let preco = Number(document.getElementById("preco").value);

    let percentual = 0.15;

    let aumento = preco * percentual;

    let novoPreco = preco + aumento;

    document.getElementById("precoOriginal").innerText =
    "Preço original: R$ " + preco.toFixed(2);

    document.getElementById("aumento").innerText =
    "Valor do aumento: R$ " + aumento.toFixed(2);

    document.getElementById("precoFinal").innerText =
    "Novo preço: R$ " + novoPreco.toFixed(2);

    document.getElementById("percentual").innerText =
    "Percentual aplicado: 15%";

    document.getElementById("diferenca").innerText =
    "Diferença de preço: R$ " + aumento.toFixed(2);

}

</script>

</body>
</html>
