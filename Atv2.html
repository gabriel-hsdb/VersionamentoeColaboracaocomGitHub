<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calculo do Lucro das camisetas </title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:rgb(163, 161, 161);
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    width:300px;
    text-align:center;
}

input{
    width:93%;
    padding:10px;
    margin:10px 0;
    border-radius: 10px;
}

button{
    background:#9f00fc;
    color:rgb(0, 0, 0);
    border:none;
    padding:10px;
    width:100%;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#a85cff;
}

.resultado{
    margin-top:20px;
    font-weight:bold;
}

input:focus,
textarea:focus {
  outline: none;
}

</style>

</head>

<body>

<div class="container">
<h2>Calculo do lucro <br> da <br> empresa
</h2>

<label>Quantas camisas foram vendidas:</label>
<input type="number" id="quantidade" placeholder="Digite a quantidade">

<button onclick="calcularLucro()">CALCULAR</button>

<div class="resultado">
<p id="lucroUnitario"></p>
<p id="lucroTotal"></p>
<p id="totalVendas"></p>
</div>
</div>

<script>

function calcularLucro(){

    const precoCompra = 25;
    const precoVenda = 40;

    let quantidade = document.getElementById("quantidade").value;

    let lucroUnitario = precoVenda - precoCompra;
    let lucroTotal = lucroUnitario * quantidade;
    let totalVendas = precoVenda * quantidade;

    document.getElementById("lucroUnitario").innerText =
    "Lucro por unidade: R$ " + lucroUnitario;

    document.getElementById("lucroTotal").innerText =
    "Lucro total: R$ " + lucroTotal;

    document.getElementById("totalVendas").innerText =
    "Total arrecadado: R$ " + totalVendas;

}

</script>

</body>
</html>
