<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Descontos</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:320px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

input{
    width:93%;
    padding:10px;
    margin:10px 0;
    border-radius: 10px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#4caf50;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#00ad34;
}

.resultado{
    margin-top:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Desconto de Produto</h2>

<label>Preço total dos produtos:</label>
<input type="number" id="preco" placeholder="Digite o preço">

<button onclick="calcularDesconto()">Calcular</button>

<div class="resultado">
<p id="desconto"></p>
<p id="precoFinal"></p>
<p id="economia"></p>
</div>

</div>

<script>

function calcularDesconto(){

    let precoOriginal = document.getElementById("preco").value;

    let desconto = precoOriginal * 0.10;

    let precoFinal = precoOriginal - desconto;

    document.getElementById("desconto").innerText =
    "Valor do desconto: R$ " + desconto.toFixed(2);

    document.getElementById("precoFinal").innerText =
    "Preço final: R$ " + precoFinal.toFixed(2);

    document.getElementById("economia").innerText =
    "Você economizou: R$ " + desconto.toFixed(2);

}

</script>

</body>
</html>
