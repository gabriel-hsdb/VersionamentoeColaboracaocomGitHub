<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Parcelamento da Compra</title>
<style>

    body{
    font-family: Arial, Helvetica, sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container{
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    width: 300px;
    text-align: center;
}

input, select{
    width: 100%;
    padding: 8px;
    margin: 10px 0;
    width: 270px;
    border-radius: 10px;
    border: 2px solid;
}

button{
    padding: 10px;
    width: 100%;
    background: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

button:hover{
    background: #45a049;
}

#resultado{
    margin-top: 20px;
    font-weight: bold;
}

input:focus,
textarea:focus {
  outline: none;
}

</style>
</head>

<body>

<div class="container">
    <h1>Parcelamento da Compra</h1>

    <label>Valor total da compra:</label>
    <input type="number" id="valorCompra" placeholder="Digite o valor">

    <label>Número de parcelas (1 a 5):</label>
    <select id="parcelas">
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="3">3x</option>
        <option value="4">4x</option>
        <option value="5">5x</option>
    </select>

    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>
</div>

<script>

    function calcular(){

    let valor = parseFloat(document.getElementById("valorCompra").value);
    let parcelas = parseInt(document.getElementById("parcelas").value);

    let valorParcela = valor / parcelas;

    document.getElementById("resultado").innerHTML =
        "Valor total da compra: R$ " + valor.toFixed(2) + "<br>" +
        "Número de parcelas: " + parcelas + "x<br>" +
        "Valor de cada parcela: R$ " + valorParcela.toFixed(2);
}

</script>

</body>
</html>
