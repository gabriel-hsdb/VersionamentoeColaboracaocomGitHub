<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cálculo de Comissão</title>
    <style>

        body { font-family: Arial,
             sans-serif;
              padding: 20px;
              background-color: #f4f4f4;
             }
        .painel { 
            background-color: white;
             padding: 20px;
              width: 320px;
              border-radius: 20px;
              box-shadow: 0 0 10px rgba(0,0,0,0.1);
             }
        input { width: 94%;
              padding: 8px;
              margin: 10px 0;
              border-radius: 10px;
              border: 1px solid #000;
             }
        button { width: 100%;
             padding: 10px;
             cursor: pointer;
             background-color: #4CAF50;
             color: white;
             border-radius: 10px;
             border: none;
                 }
        #resultado { margin-top: 20px;
             background: #f0f0f0;
              padding: 10px;
              border-radius: 10px;
             }
             h3 {
                text-align: center;
             }
    </style>
</head>
<body>

    <div class="painel">
        <h3>Sistema de Comissão</h3>
        
        <label>Total de Vendas do Mês (R$):</label>
        <input type="number" id="vendasInput" placeholder="Ex: 5000">
        
        <button onclick="calcularComissao()">Calcular Recebimento</button>

        <div id="resultado">
            </div>
    </div>

    <script>
        function calcularComissao() {

            var totalVendas = document.getElementById('vendasInput').value;
            

            var taxaComissao = 0.05;
            var salarioFixo = 1500.00;


            var valorComissao = totalVendas * taxaComissao;
            var salarioTotal = salarioFixo + valorComissao;



            document.getElementById('resultado').innerHTML = 
                "<strong>Resumo:</strong><br>" +
                "Vendas Totais: R$ " + parseFloat(totalVendas).toFixed(2) + "<br>" +
                "Sua Comissão: R$ " + valorComissao.toFixed(2) + "<br>" +
                "<hr>" +
                "<strong>Total a receber: R$ " + salarioTotal.toFixed(2) + "</strong>";
        }
    </script>

</body>
</html>
